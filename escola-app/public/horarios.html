<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
<title>Horários</title>
</head>
<body>

<div class="menu">
<h2>🏫 Escola</h2>
<a href="index.html">Dashboard</a>
<a href="professores.html">Professores</a>
<a href="turmas.html">Turmas</a>
<a href="horarios.html">Horários</a>
</div>

<div class="content">
<h1>📅 Horários</h1>

<div class="card">
<select id="turma"></select>
<select id="professor"></select>
<select id="dia">
<option>Segunda</option>
<option>Terca</option>
<option>Quarta</option>
<option>Quinta</option>
<option>Sexta</option>
</select>
<select id="hora">
<option>08:30 - 9:20</option>
<option>09:30 - 10:20</option>
<option>10:45 - 11:35</option>
<option>11:45 - 12:30</option>
<option>13:00 - 13:50</option>
<option>14:00 - 14:50</option>
<option>15:00 - 15:50</option>
<option>16:10 - 17:00</option>
<option>17:10 - 18:00</option>
</select>

<select id="disciplina">
<option>MAT</option>
<option>PORT</option>
<option>ING</option>
<option>PSI</option>
<option>FQ</option>
<option>EF</option>
<option>SO</option>
<option>AC</option>
<option>RC</option>
<option>FRA</option>
<option>AI</option>
</select>
<button onclick="addHorario()">Adicionar</button>
<button onclick="abrirDisciplina()">+ Disciplina</button>
<div id="novaDisciplinaBox" style="display:none" class="card">

<h3>Nova Disciplina</h3>

<input id="discNome" placeholder="Nome da disciplina">

<label>Cor da disciplina</label>
<input type="color" id="discCor">

<label>Cor do texto</label>
<select id="discTexto">
<option value="#ffffff">Branco</option>
<option value="#000000">Preto</option>
</select>

<button onclick="guardarDisciplina()">Guardar</button>
<button onclick="fecharDisciplina()">Cancelar</button>

</div>
</div>

<table>
<thead>
<tr>
<th>Hora</th>
<th>Seg</th>
<th>Ter</th>
<th>Qua</th>
<th>Qui</th>
<th>Sex</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

</div>

<script src="script.js"></script>
<div id="editarBox" class="card" style="display:none; position:fixed; top:20%; left:40%; z-index:1000;">
<h3>Editar Aula</h3>

<select id="editTurma"></select>
<select id="editProfessor"></select>

<select id="editDia">
<option>Segunda</option>
<option>Terca</option>
<option>Quarta</option>
<option>Quinta</option>
<option>Sexta</option>
</select>

<select id="editHora">
<option>08:30 - 9:20</option>
<option>09:30 - 10:20</option>
<option>10:45 - 11:35</option>
<option>11:45 - 12:30</option>
<option>13:00 - 13:50</option>
<option>14:00 - 14:50</option>
<option>15:00 - 15:50</option>
<option>16:10 - 17:00</option>
<option>17:10 - 18:00</option>
</select>

<select id="editDisciplina"></select>

<button onclick="guardarEdicao()">Guardar</button>
<button onclick="fecharEditor()">Cancelar</button>
</div>
</body>
</html>
