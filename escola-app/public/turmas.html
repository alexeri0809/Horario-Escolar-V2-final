<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
<title>Turmas</title>
</head>
<body>

<div class="menu">
<h2>🏫 Escola</h2>
<a href="index.html">Dashboard</a>
<a href="professores.html">Professores</a>
<a href="turmas.html">Turmas</a>
<a href="horarios.html">Horários</a>
</div>

<div class="content">
<h1>🎓 Turmas</h1>

<div class="card">
<input id="nome" placeholder="Nome da turma">
<button onclick="addTurma()">Adicionar</button>
</div>

<table>
<thead>
<tr>
<th>ID</th>
<th>Turma</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</div>

<script>
async function carregar(){
    let r=await fetch("/turmas")
    let dados=await r.json()
    let lista=document.getElementById("lista")
    lista.innerHTML=""
    dados.forEach(t=>{
        lista.innerHTML+=`
        <tr>
        <td>${t.id}</td>
        <td>${t.nome}</td>
        <td>
        <button onclick="apagarTurma(${t.id})">❌</button>
        </td>
        </tr>
        `
    })
}

async function addTurma(){
    let nome=document.getElementById("nome").value
    if(!nome) return
    await fetch("/turmas",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({nome})})
    document.getElementById("nome").value=""
    carregar()
}

async function apagarTurma(id){
    let r=await fetch("/turmas/"+id,{
        method:"DELETE",
        headers: {"Content-Type":"application/json"}
    })
    let res=await r.json()
    if(res.ok) carregar()
    else alert("Erro ao apagar: "+res.error)
}

carregar()
</script>

</body>
</html>
